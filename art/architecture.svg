<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="CapDB architecture">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="45%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0c1528"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a5d73"/>
      <stop offset="100%" stop-color="#243041"/>
    </linearGradient>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a4f28"/>
      <stop offset="35%" stop-color="#d4a574"/>
      <stop offset="65%" stop-color="#e8c9a0"/>
      <stop offset="100%" stop-color="#7a4f28"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="violetGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="portGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="1"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowViolet" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrowViolet" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#c4b5fd"/>
    </marker>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <symbol id="gear" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4" fill="none" stroke="#d4a574" stroke-width="1.5"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M4.9 19.1l2.1-2.1M17 7l2.1-2.1" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#grid)" opacity="0.28"/>

  <!-- corner brackets -->
  <path d="M18 18 H42 V28" fill="none" stroke="url(#copper)" stroke-width="2"/>
  <path d="M942 18 H918 V28" fill="none" stroke="url(#copper)" stroke-width="2"/>
  <path d="M18 522 H42 V512" fill="none" stroke="url(#copper)" stroke-width="2"/>
  <path d="M942 522 H918 V512" fill="none" stroke="url(#copper)" stroke-width="2"/>

  <!-- header -->
  <rect x="28" y="22" width="904" height="54" rx="12" fill="#121a2c" stroke="url(#copper)" stroke-width="2" filter="url(#softShadow)"/>
  <use href="#gear" x="44" y="37" width="22" height="22" opacity="0.85"/>
  <circle cx="82" cy="49" r="8" fill="url(#portGlow)" filter="url(#glowCyan)"/>
  <circle cx="82" cy="49" r="3.5" fill="#ecfeff"/>
  <circle cx="104" cy="49" r="5" fill="#f59e0b" opacity="0.95"/>
  <text x="122" y="54" fill="#f1f5f9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="800" letter-spacing="0.12em">CAPDB</text>
  <text x="218" y="54" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500">architecture</text>
  <text x="700" y="54" fill="#22d3ee" font-family="ui-monospace, monospace" font-size="12" font-weight="600">capdb://</text>
  <text x="790" y="54" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="12">TLS · WAL · HA</text>

  <!-- CLIENTS -->
  <g filter="url(#softShadow)">
    <rect x="28" y="96" width="904" height="96" rx="14" fill="#0d1424" stroke="#334155" stroke-width="1.5"/>
    <line x1="48" y1="118" x2="120" y2="118" stroke="#22d3ee" stroke-width="2"/>
    <text x="128" y="122" fill="#67e8f9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="0.22em">CLIENTS</text>

    <rect x="48" y="136" width="252" height="46" rx="23" fill="url(#steel)" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="74" cy="159" r="8" fill="url(#portGlow)" filter="url(#glowCyan)"/>
    <circle cx="74" cy="159" r="3" fill="#ecfeff"/>
    <text x="92" y="164" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">capdb CLI</text>

    <rect x="320" y="136" width="284" height="46" rx="23" fill="url(#steel)" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="346" cy="159" r="8" fill="url(#portGlow)" filter="url(#glowCyan)"/>
    <circle cx="346" cy="159" r="3" fill="#ecfeff"/>
    <text x="364" y="164" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">libcapdb_client</text>

    <rect x="624" y="136" width="288" height="46" rx="23" fill="url(#steel)" stroke="url(#amberGlow)" stroke-width="2"/>
    <circle cx="650" cy="159" r="8" fill="#f59e0b" opacity="0.35"/>
    <circle cx="650" cy="159" r="3.5" fill="#fde68a"/>
    <text x="668" y="164" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">capdbvfs · remote pages</text>
  </g>

  <!-- client drops -->
  <path d="M174 202 C174 218 174 228 174 234" stroke="#22d3ee" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)" filter="url(#glowCyan)"/>
  <path d="M462 202 C462 218 462 228 462 234" stroke="#38bdf8" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)"/>
  <path d="M768 202 C768 218 768 228 768 234" stroke="#f59e0b" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)"/>

  <!-- PRIMARY -->
  <g filter="url(#softShadow)">
    <rect x="28" y="244" width="556" height="272" rx="16" fill="#0a1020" stroke="url(#copper)" stroke-width="2.5"/>
    <!-- rivets -->
    <circle cx="44" cy="260" r="3" fill="#d4a574"/><circle cx="568" cy="260" r="3" fill="#d4a574"/>
    <circle cx="44" cy="500" r="3" fill="#d4a574"/><circle cx="568" cy="500" r="3" fill="#d4a574"/>
    <rect x="28" y="244" width="556" height="36" rx="16" fill="#151f33"/>
    <rect x="28" y="264" width="556" height="16" fill="#151f33"/>
    <text x="48" y="268" fill="#e8c9a0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="0.18em">PRIMARY</text>
    <text x="138" y="268" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">capdb-server</text>

    <rect x="52" y="300" width="154" height="60" rx="10" fill="#182235" stroke="#818cf8" stroke-width="2"/>
    <text x="70" y="324" fill="#a5b4fc" font-family="ui-monospace, monospace" font-size="10" font-weight="700">TLS</text>
    <text x="70" y="344" fill="#f1f5f9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">capdb protocol</text>

    <rect x="228" y="300" width="136" height="60" rx="10" fill="#102a2a" stroke="#2dd4bf" stroke-width="2"/>
    <text x="246" y="336" fill="#5eead4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="800">capdb_pool</text>

    <rect x="386" y="292" width="178" height="76" rx="12" fill="#1a1508" stroke="url(#amberGlow)" stroke-width="2.5"/>
    <text x="404" y="318" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="10" font-weight="800">VOLUME STORE</text>
    <text x="404" y="342" fill="#fef9c3" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">capdb_store</text>
    <text x="404" y="358" fill="#a8a29e" font-family="ui-monospace, monospace" font-size="10">capdbstorevfs</text>

    <rect x="140" y="396" width="280" height="60" rx="12" fill="#1a0f33" stroke="url(#violetGlow)" stroke-width="2.5"/>
    <text x="162" y="432" fill="#ede9fe" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="800">capdb_replication</text>
    <circle cx="396" cy="426" r="7" fill="url(#portGlow)" filter="url(#glowViolet)"/>

    <path d="M206 330 L224 330" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
    <path d="M364 330 L382 330" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
    <path d="M475 368 L310 396" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
  </g>

  <!-- WAL stream arc -->
  <path d="M584 426 C640 426 652 360 696 348" fill="none" stroke="url(#violetGlow)" stroke-width="5" stroke-dasharray="12 7" marker-end="url(#arrowViolet)" filter="url(#glowViolet)"/>
  <rect x="592" y="400" width="116" height="28" rx="14" fill="#2e1065" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="608" y="419" fill="#f5f3ff" font-family="ui-monospace, monospace" font-size="11" font-weight="800">WAL stream</text>

  <!-- REPLICA -->
  <g filter="url(#softShadow)">
    <rect x="608" y="244" width="324" height="272" rx="16" fill="#090d18" stroke="#7c3aed" stroke-width="2" stroke-dasharray="8 5"/>
    <rect x="608" y="244" width="324" height="36" rx="16" fill="#1a1033"/>
    <rect x="608" y="264" width="324" height="16" fill="#1a1033"/>
    <text x="628" y="268" fill="#c4b5fd" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="0.18em">REPLICA</text>
    <text x="708" y="268" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">capdb-server · read-only</text>

    <rect x="636" y="300" width="154" height="60" rx="10" fill="#182235" stroke="#818cf8" stroke-width="2"/>
    <text x="654" y="324" fill="#a5b4fc" font-family="ui-monospace, monospace" font-size="10" font-weight="700">TLS</text>
    <text x="654" y="344" fill="#f1f5f9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">capdb protocol</text>

    <rect x="636" y="378" width="136" height="60" rx="10" fill="#102a2a" stroke="#2dd4bf" stroke-width="2"/>
    <text x="654" y="414" fill="#5eead4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="800">capdb_pool</text>

    <rect x="792" y="370" width="124" height="76" rx="12" fill="#1a1033" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="804" y="396" fill="#c4b5fd" font-family="ui-monospace, monospace" font-size="10" font-weight="800">SYNCED</text>
    <text x="804" y="420" fill="#ede9fe" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800">capdb_store</text>

    <path d="M790 330 L636 378" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
    <path d="M772 408 L788 408" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
  </g>

  <!-- legend bar -->
  <rect x="28" y="488" width="904" height="36" rx="10" fill="#070b14" stroke="#1e293b" stroke-width="1"/>
  <circle cx="54" cy="506" r="6" fill="#22d3ee" filter="url(#glowCyan)"/>
  <text x="68" y="510" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">wire</text>
  <circle cx="128" cy="506" r="6" fill="#2dd4bf"/>
  <text x="142" y="510" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">pool</text>
  <circle cx="198" cy="506" r="6" fill="#f59e0b"/>
  <text x="212" y="510" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">volume</text>
  <circle cx="288" cy="506" r="6" fill="#a78bfa"/>
  <text x="302" y="510" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">replication</text>
  <use href="#gear" x="860" y="494" width="24" height="24" opacity="0.5"/>
</svg>
