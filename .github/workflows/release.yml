name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev zlib1g-dev python3 default-jdk-headless

      - name: Build, test, and package
        run: scripts/release.sh build-release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capdb-release-artifacts
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
